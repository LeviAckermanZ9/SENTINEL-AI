# ============================================
# SENTINEL-AI — Kubernetes Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: sentinel-api-service
  namespace: sentinel-prod
  labels:
    app: sentinel-api
spec:
  type: ClusterIP
  selector:
    app: sentinel-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 8000
      protocol: TCP
